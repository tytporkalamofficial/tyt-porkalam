<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYT PORKALAM - Live Standings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. INTRO WELCOME PANEL */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f7f9fa;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .intro-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-title {
            font-size: 36px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .enter-btn {
            background-color: #ff5100;
            border: none;
            color: #ffffff;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 2. MAIN TOURNAMENT CONTAINER */
        .main-dashboard {
            width: 100%;
            max-width: 1200px;
            opacity: 0;
            visibility: hidden;
            display: flex;
            flex-direction: column;
        }

        .main-dashboard.show {
            opacity: 1;
            visibility: visible;
        }

        .status-bar {
            align-self: flex-end;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* EXACT SPREADSHEET REPLICA TABLE GRID */
        .table-container {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #999999;
        }

        .sheet-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background-color: #ffffff;
        }

        /* Borders and Cell structure */
        .sheet-table th, .sheet-table td {
            border: 1px solid #a3a3a3;
            padding: 6px 8px;
            text-align: center;
            vertical-align: middle;
        }

        /* Main Spreadsheet Style Headers */
        .title-header {
            background-color: #fbc4c4; /* Light Pink Tone from Screenshot */
            font-size: 16px;
            font-weight: bold;
            color: #000000;
            letter-spacing: 0.5px;
        }

        .map-header {
            background-color: #d9ebd9; /* Subtle soft green tone */
            font-weight: bold;
            color: #000000;
        }

        .label-header {
            background-color: #d9ebd9;
            font-weight: bold;
            color: #000000;
        }

        /* Data Rows Text Formatting */
        .sheet-table tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .team-name-cell {
            text-align: left;
            font-weight: bold;
            padding-left: 12px;
            color: #000000;
        }

        .total-points-cell {
            background-color: #eff3f7;
            font-weight: bold;
        }

        .blank-row td {
            height: 28px;
            background-color: #ffffff !important;
        }
    </style>
</head>
<body>

    <!-- 1. INTRO SCREEN -->
    <div class="intro-screen" id="introScreen">
        <h1 class="intro-title">TYT PORKALAM</h1>
        <button class="enter-btn" onclick="enterDashboard()">Enter Tournament</button>
    </div>

    <!-- 2. MAIN TOURNAMENT DASHBOARD -->
    <div class="main-dashboard" id="mainDashboard">
        <div class="status-bar" id="syncStatus">Connecting...</div>

        <!-- Spreadsheet Table Component Wrapper -->
        <div class="table-container">
            <table class="sheet-table">
                <thead>
                    <!-- Top Title Bar Row -->
                    <tr>
                        <th colspan="11" class="title-header" id="mainSheetTitle">TYT PORKALAM</th>
                    </tr>
                    <!-- Maps Segment Row -->
                    <tr id="mapHeaderRow">
                        <!-- Dynamic Maps Inserted Here -->
                    </tr>
                    <!-- P & K Sub Labels Row -->
                    <tr id="subLabelRow">
                        <!-- Dynamic Sub Labels Inserted Here -->
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="11" style="padding: 20px; color: #555;">Loading tournament records...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3BrEMJsf28yxJW41GWpvyvDLy5WTwFnsCSJjZC9SOP6Gky-V3_UHvHREXKcor0pq1YFz_FuFg1zN6/pub?output=csv";

        function enterDashboard() {
            document.getElementById('introScreen').classList.add('hide');
            document.getElementById('mainDashboard').classList.add('show');
            loadSheetData();
            setInterval(loadSheetData, 10000); // Live background sync
        }

        async function loadSheetData() {
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(SHEET_CSV_URL)}&_=${new Date().getTime()}`);
                const data = await res.json();
                renderSpreadsheet(data.contents);
                document.getElementById('syncStatus').innerText = "Live Synced";
            } catch (err) {
                // Secondary fallback directly attempting connection
                try {
                    const fallback = await fetch(SHEET_CSV_URL);
                    const text = await fallback.text();
                    renderSpreadsheet(text);
                } catch(e) {
                    document.getElementById('syncStatus').innerText = "Sync Error";
                }
            }
        }

        function parseCSV(text) {
            let lines = text.split(/\r?\n/);
            return lines.map(line => {
                let row = [];
                let curr = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    let char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        row.push(curr.trim());
                        curr = '';
                    } else curr += char;
                }
                row.push(curr.trim());
                return row;
            }).filter(r => r.length > 0 && r.some(c => c !== ''));
        }

        function renderSpreadsheet(csvText) {
            const matrix = parseCSV(csvText);
            if (matrix.length < 3) return;

            const mapRow = matrix[0];
            const keyRow = matrix[1];

            const mapHeaderRow = document.getElementById('mapHeaderRow');
            const subLabelRow = document.getElementById('subLabelRow');
            const tableBody = document.getElementById('tableBody');

            mapHeaderRow.innerHTML = '';
            subLabelRow.innerHTML = '';
            tableBody.innerHTML = '';

            // Build Exact Layout Structure based on Sheet setup keys
            let c = 0;
            let totalColumnsCount = 0;

            while (c < keyRow.length) {
                let colName = keyRow[c].toUpperCase();

                if (colName === 'S:NO' || colName === 'TEAM NAME') {
                    mapHeaderRow.innerHTML += `<th rowspan="2" class="label-header">${keyRow[c]}</th>`;
                    c++;
                    totalColumnsCount++;
                } else if (colName.includes('TOTAL')) {
                    mapHeaderRow.innerHTML += `<th rowspan="2" class="label-header">${keyRow[c]}</th>`;
                    c++;
                    totalColumnsCount++;
                } else if (colName === 'P' && keyRow[c+1]?.toUpperCase() === 'K') {
                    let mapLabel = mapRow[c] || 'MAP';
                    mapHeaderRow.innerHTML += `<th colspan="2" class="map-header">${mapLabel}</th>`;
                    subLabelRow.innerHTML += `<th class="label-header">P</th><th class="label-header">K</th>`;
                    c += 2;
                    totalColumnsCount += 2;
                } else {
                    if(keyRow[c]) {
                        mapHeaderRow.innerHTML += `<th rowspan="2" class="label-header">${keyRow[c]}</th>`;
                        totalColumnsCount++;
                    }
                    c++;
                }
            }

            // Update main container span spacing seamlessly
            document.getElementById('mainSheetTitle').setAttribute('colspan', totalColumnsCount);

            // Filter out empty spaces and populate real-time positions
            let teamList = [];
            let totalIdx = keyRow.findIndex(name => name.toUpperCase().includes('TOTAL'));

            for (let r = 2; r < matrix.length; r++) {
                let data = matrix[r];
                if (!data[1]) continue; 
                let score = totalIdx !== -1 ? parseInt(data[totalIdx]) || 0 : 0;
                teamList.push({ raw: data, score: score });
            }

            // Keep the raw positions or sorting synced to your active sheet metrics
            teamList.forEach((team, idx) => {
                let trHtml = `<tr>`;
                let colPointer = 0;
                let rankNum = idx + 1;

                while (colPointer < keyRow.length) {
                    let val = team.raw[colPointer] || '';
                    let label = keyRow[colPointer].toUpperCase();

                    if (label === 'S:NO') {
                        trHtml += `<td>${rankNum}</td>`;
                        colPointer++;
                    } else if (label === 'TEAM NAME') {
                        trHtml += `<td class="team-name-cell">${val}</td>`;
                        colPointer++;
                    } else if (label.includes('TOTAL')) {
                        trHtml += `<td class="total-points-cell">${val}</td>`;
                        colPointer++;
                    } else if (label === 'P' && keyRow[colPointer+1]?.toUpperCase() === 'K') {
                        let pVal = team.raw[colPointer] || '-';
                        let kVal = team.raw[colPointer+1] || '-';
                        trHtml += `<td>${pVal}</td><td>${kVal}</td>`;
                        colPointer += 2;
                    } else {
                        trHtml += `<td>${val}</td>`;
                        colPointer++;
                    }
                }
                trHtml += `</tr>`;
                tableBody.innerHTML += trHtml;
            });

            // Append optional exact blank rows to preserve spreadsheet styling authenticity
            for (let b = 0; b < 2; b++) {
                let blankHtml = `<tr class="blank-row">`;
                for (let k = 0; k < totalColumnsCount; k++) {
                    blankHtml += `<td></td>`;
                }
                blankHtml += `</tr>`;
                tableBody.innerHTML += blankHtml;
            }
        }
    </script>
</body>
</html>
