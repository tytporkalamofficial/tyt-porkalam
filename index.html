<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYT PORKALAM - BGMI Esports Combo Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
<style>
/* Pure page ko block karne wali welcome screen */
.premium-splash {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #050100;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 9999999 !important;
    overflow: hidden;
    transition: opacity 0.6s ease, transform 0.6s ease;
}

/* Fire Background Animation */
.fire-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, rgba(40,10,0,0.6) 0%, #000000 100%);
    pointer-events: none;
}
.fire-particle {
    position: absolute;
    bottom: -20px;
    background: radial-gradient(circle, #ff4500 20%, rgba(255,140,0,0) 70%);
    border-radius: 50%;
    opacity: 0.6;
    animation: riseUp 4s linear infinite;
}
@keyframes riseUp {
    0% { transform: translateY(0) scale(1) translateX(0); opacity: 0.7; }
    50% { transform: translateY(-50vh) scale(1.3) translateX(20px); opacity: 0.4; }
    100% { transform: translateY(-110vh) scale(0.5) translateX(-20px); opacity: 0; }
}

/* TYT PORKALAM Dancing / Glow Text Effect */
.dancing-title {
    color: #ffffff;
    font-size: 46pt;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 30px;
    z-index: 2;
    position: relative;
    text-shadow: 0 0 20px #ff4500, 0 0 40px #ff8c00;
    animation: textDance 3s ease-in-out infinite alternate;
}
@keyframes textDance {
    0% { transform: translateY(0) rotate(-1deg); text-shadow: 0 0 20px #ff4500, 0 0 40px #ff8c00; }
    50% { transform: translateY(-10px) rotate(1deg) scale(1.03); text-shadow: 0 0 30px #ff0000, 0 0 50px #ffd700; }
    100% { transform: translateY(5px) rotate(-0.5deg); text-shadow: 0 0 25px #ff4500, 0 0 45px #ff8c00; }
}

/* Enter Tournament Action Button */
.enter-esports-btn {
    background: linear-gradient(135deg, #ff4500 0%, #b30000 100%);
    color: #ffffff;
    border: 2px solid #ffd700;
    padding: 16px 45px;
    font-size: 16pt;
    font-weight: 800;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    z-index: 2;
    box-shadow: 0 0 25px rgba(255, 69, 0, 0.6);
    transition: all 0.2s ease;
}
.enter-esports-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 45px #ff4500;
    background: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%);
}

/* Smooth Fade Out Class */
.premium-splash.fade-hide {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
}

/* Arrow Styling & Animation */
.pos-change { 
    font-size: 11pt; 
    font-weight: 900; 
    margin-left: 8px; 
    display: inline-block;
    vertical-align: middle;
    animation: arrowPop 0.3s ease-out;
}
@keyframes arrowPop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
.pos-up { color: #00ff66 !important; text-shadow: 0 0 8px rgba(0, 255, 102, 0.6); }
.pos-down { color: #ff3333 !important; text-shadow: 0 0 8px rgba(255, 51, 51, 0.6); }
.table-row { transition: all 0.5s ease; }
</style>

<div id="porkalamSplash" class="premium-splash">
    <div class="fire-bg">
        <div class="fire-particle" style="left:10%; width:15px; height:15px; animation-delay:0s; animation-duration:5s;"></div>
        <div class="fire-particle" style="left:25%; width:22px; height:22px; animation-delay:1.5s; animation-duration:4s;"></div>
        <div class="fire-particle" style="left:45%; width:12px; height:12px; animation-delay:0.5s; animation-duration:6s;"></div>
        <div class="fire-particle" style="left:65%; width:26px; height:26px; animation-delay:2s; animation-duration:4.5s;"></div>
        <div class="fire-particle" style="left:80%; width:18px; height:18px; animation-delay:1s; animation-duration:5.5s;"></div>
    </div>
    
    <div class="dancing-title">TYT PORKALAM</div>
    <button class="enter-esports-btn" onclick="openMainPointsTable()">Enter Tournament</button>
</div>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 10px 20px; 
            background: radial-gradient(circle at 50% 50%, #1a0500 0%, #050100 100%) !important;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: background 0.8s ease !important;
        }

        #odysseyCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            width: 100% !important;
            max-width: 1400px !important;
            background: transparent !important; 
            border: none !important; 
            box-shadow: none !important; 
            position: relative;
            z-index: 2;
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255, 69, 0, 0.3);
            padding-bottom: 15px;
            position: relative;
            width: 100%;
        }

        .main-title {
            font-size: 40pt;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0;
            color: #ffffff !important;
            text-shadow: 0 0 10px #ff4500, 0 0 20px #ff8c00, 0 0 30px #ff0000 !important;
        }

        .subtitle {
            font-size: 14pt;
            color: #ff007f;
            margin: 6px 0 0 0;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.5);
        }

        .live-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 69, 0, 0.2) !important;
            border: 1px solid #ff4500 !important;
            color: #ffaa66 !important;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.4) !important;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11pt;
            font-weight: bold;
            text-transform: uppercase;
        }

        .table-responsive {
            overflow-x: auto;
            width: 100%; 
            margin: 0 auto;
        }

        table {
            width: 100%; 
            border-collapse: collapse;
            background-color: rgba(12, 4, 2, 0.85) !important; 
            border: 2px solid rgba(255, 69, 0, 0.4) !important;
            backdrop-filter: blur(2px); 
            margin: 0 auto;
        }

        th {
            background: linear-gradient(180deg, rgba(42,11,3,0.9) 0%, rgba(18,3,0,0.95) 100%) !important;
            border-bottom: 2px solid #ff4500 !important;
            color: #ff8c00 !important;
            font-weight: 800;
            text-transform: uppercase;
            padding: 10px 6px !important;
            border: 1.5px solid rgba(255, 69, 0, 0.3);
            text-align: center;
            font-size: 12pt !important;
            white-space: nowrap;
        }

        td {
            padding: 10px 6px !important;
            border: 1.5px solid rgba(255, 69, 0, 0.25) !important;
            text-align: center; 
            color: #ffffff;
            font-size: 12.5pt !important;
            font-weight: 600;
            text-shadow: 0 1px 4px rgba(0,0,0,0.95);
            white-space: nowrap;
        }

        .rank-header, .rank-cell { width: 75px !important; }
        .team-name-head, .team-name-cell { width: 250px !important; text-align: left !important; padding-left: 15px !important; }
        .total-points-head, .neon-score { width: 130px !important; }
        .top-killer-head { width: 180px !important; text-align: left !important; padding-left: 15px !important; }

        th.map-header { font-size: 11pt; font-weight: 800; background-color: rgba(40, 15, 5, 0.95); color: #ffffff; }
        th.sub-th { background-color: rgba(20, 8, 3, 0.85); font-size: 10pt; color: #a0aec0; }

        .team-emoji { margin-right: 6px; display: inline-block; font-size: 12pt; vertical-align: middle; }
        td.neon-score { color: #ffaa44 !important; text-shadow: 0 0 8px rgba(255, 140, 0, 0.6) !important; font-size: 13.5pt !important; font-weight: 700 !important;}
        td.rank-cell { font-family: 'Impact', 'Arial Black', sans-serif; text-shadow: 0 0 8px rgba(255, 170, 0, 0.4); color: #ffaa00; font-size: 13.5pt !important; }

        tr:nth-child(even) td { background-color: rgba(30, 15, 10, 0.25); } 
        tr:hover td { background-color: rgba(255, 69, 0, 0.15); } 
        
        tr.rank-1 td { background-color: rgba(255, 69, 0, 0.2) !important; border-bottom: 1px solid #ffd700 !important; }
        tr.rank-1 td.team-name-cell { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.5); }
        tr.rank-1 td.rank-cell { color: #ffd700; }

        .status-message { text-align: center; padding: 30px; color: #a0aec0; font-size: 13pt; font-style: italic; }

        .champion-popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 3, 0, 0.95);
            backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 999999 !important;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .champion-popup-overlay.show { opacity: 1; pointer-events: auto; }
        .champion-card {
            background: linear-gradient(135deg, #3a1003 0%, #0c0400 100%);
            border: 3px solid #ff4500;
            box-shadow: 0 0 60px rgba(255, 69, 0, 0.6), inset 0 0 30px rgba(255, 140, 0, 0.3);
            padding: 50px 70px;
            border-radius: 24px;
            text-align: center;
            transform: scale(0.6);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .champion-popup-overlay.show .champion-card { transform: scale(1); }
        .champion-title { color: #ffd700; font-size: 22pt; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .champion-name { color: #ffffff; font-size: 42pt; font-weight: 900; margin: 15px 0; text-shadow: 0 0 25px #ff4500, 0 0 10px #ffffff; }
        .champion-badge { font-size: 55pt; margin-bottom: 5px; animation: firePulse 0.8s infinite alternate; }
        @keyframes firePulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #ff4500); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 20px #ff8c00); }
        }

        #crackersCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999999 !important; }
    </style>
</head>
<body>

<canvas id="odysseyCanvas"></canvas>

<div class="container">
    <div class="header-container">
        <h1 class="main-title">TYT PORKALAM</h1>
        <div class="subtitle">🔥ONLY THE STRONGEST SQUAD WILL SURVIVE🔥</div>
        <div class="live-badge">● Live Sync</div>
    </div>

    <div class="table-responsive">
        <table>
            <thead id="team-points-head">
                <tr><th class="status-message">LOADING HEADERS...</th></tr>
            </thead>
            <tbody id="team-points-body">
                <tr><td class="status-message">CONNECTING TO DATABASE...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<canvas id="crackersCanvas"></canvas>
<div id="championPopup" class="champion-popup-overlay">
    <div class="champion-card">
        <div class="champion-badge">👑🔥</div>
        <div class="champion-title">CURRENT #1 LEADER</div>
        <div class="champion-name" id="popLeaderName">LOADING...</div>
    </div>
</div>

<script>
    // 🔗 AAPKI LIVE API URL
    const REALTIME_API_URL = "https://script.google.com/macros/s/AKfycbyLUuoNxnyJWdislLAR3X0Fv-K8Tjg5-lObdW1UdNK5qGTDP5MoVsV_72GoRYbDT1P6Pw/exec";

    if (!window.rankMemory) {
        window.rankMemory = {};
    }

    function calculateRankArrow(teamName, currentRank) {
        if (!teamName) return '';
        let arrowHTML = '';
        let oldRank = window.rankMemory[teamName];
        
        if (oldRank !== undefined) {
            if (currentRank < oldRank) {
                arrowHTML = `<span class="pos-change pos-up">↑${oldRank - currentRank}</span>`;
            } else if (currentRank > oldRank) {
                arrowHTML = `<span class="pos-change pos-down">↓${currentRank - oldRank}</span>`;
            }
        }
        window.rankMemory[teamName] = currentRank;
        return arrowHTML;
    }

    function getTeamEmoji(teamName) {
        if (!teamName) return '🎮';
        const name = teamName.toUpperCase();
        if (name.includes('CAMP')) return '⛺';
        if (name.includes('HUNT')) return '🏹';
        if (name.includes('BOT')) return '🤖';
        if (name.includes('THUND')) return '⚡';
        return '⚔️'; 
    }

    async function fetchAllSheetsData() {
        try {
            const response = await fetch(`${REALTIME_API_URL}?_=${new Date().getTime()}`);
            const allData = await response.json();
            
            if(allData && allData.mapList && allData.teams) {
                renderDynamicTable(allData);
            }
        } catch (error) { console.error("Sync error:", error); }
    }

    function renderDynamicTable(data) {
        const thead = document.getElementById('team-points-head');
        const tbody = document.getElementById('team-points-body');
        
        // --- 1. DYNAMIC HEADERS GENERATION ---
        let headRow1 = '<tr><th rowspan="2" class="rank-header">RANK</th><th rowspan="2" class="team-name-head">TEAM NAME</th>';
        let headRow2 = '</tr><tr>';
        
        // Saare maps ke columns loop se ban rahe hain
        data.mapList.forEach(mapName => {
            headRow1 += `<th colspan="2" class="map-header">${mapName.toUpperCase()}</th>`;
            headRow2 += `<th class="sub-th">P</th><th class="sub-th">K</th>`;
        });
        
        headRow1 += `<th rowspan="2" class="total-points-head">TP</th><th rowspan="2" class="top-killer-head">TOP KILLER</th></tr>`;
        thead.innerHTML = headRow1 + headRow2;

        // --- 2. DYNAMIC ROWS GENERATION ---
        tbody.innerHTML = '';
        let currentRank = 1;
        
        // Total points ke basis par JavaScript me automatic high to low sort kar dena safe hai
        data.teams.sort((a, b) => (Number(b.totalPoints) || 0) - (Number(a.totalPoints) || 0));

        data.teams.forEach(team => {
            const tr = document.createElement('tr');
            tr.classList.add(`rank-${currentRank}`, 'table-row');
            
            let arrow = calculateRankArrow(team.teamName, currentRank);
            let badge = currentRank === 1 ? '🥇' : (currentRank === 2 ? '🥈' : (currentRank === 3 ? '🥉' : currentRank));
            
            let rowHTML = `<td class="rank-cell">${badge}${arrow}</td>`;
            rowHTML += `<td class="team-name-cell"><span class="team-emoji">${getTeamEmoji(team.teamName)}</span>${team.teamName}</td>`;
            
            // Map scores render karein
            team.scores.forEach(score => {
                rowHTML += `<td>${score !== undefined ? score : 0}</td>`;
            });
            
            rowHTML += `<td class="neon-score">${team.totalPoints}</td>`;
            rowHTML += `<td class="top-killer-head" style="font-size:11pt; color:#cbd5e0;">${team.topKiller}</td>`;
            
            tr.innerHTML = rowHTML;
            tbody.appendChild(tr);
            currentRank++;
        });

        // #1 Team Celebration Trigger
        if (data.teams.length > 0) {
            triggerCelebration(data.teams[0].teamName);
        }
    }

    let lastWinner = "";
    function triggerCelebration(winnerName) {
        if (!winnerName || winnerName === "LOADING...") return;
        if (lastWinner !== winnerName) {
            lastWinner = winnerName;
            document.getElementById('popLeaderName').innerText = winnerName;
            const popup = document.getElementById('championPopup');
            popup.classList.add('show');
            triggerNativeCrackers();
            setTimeout(() => popup.classList.remove('show'), 3000);
        }
    }
</script>

<script>
// Background & Animation effects
const canvas = document.getElementById('odysseyCanvas');
const ctx = canvas.getContext('2d');
function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', initCanvas); initCanvas();

function initFireBackground() {
    let particles = [];
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 100;
            this.size = Math.random() * 3 + 1;
            this.speedY = Math.random() * 1.2 + 0.4;
            this.speedX = Math.random() * 0.8 - 0.4;
            this.opacity = Math.random() * 0.4 + 0.4;
        }
        update() { this.y -= this.speedY; this.x += this.speedX; if (this.y < -10) { this.y = canvas.height + 10; this.x = Math.random() * canvas.width; } }
        draw() { ctx.fillStyle = `rgba(255, ${Math.floor(Math.random() * 90) + 40}, 0, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    for (let i = 0; i < 40; i++) particles.push(new Particle());
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    animate();
}

const cCanvas = document.getElementById('crackersCanvas');
const cCtx = cCanvas.getContext('2d');
let cParticles = [], crackersAnimationId;
function resizeCrackersCanvas() { cCanvas.width = window.innerWidth; cCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCrackersCanvas); resizeCrackersCanvas();

class CrackerParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color; this.radius = Math.random() * 3 + 2;
        const angle = Math.random() * Math.PI * 2, velocity = Math.random() * 10 + 4;
        this.speedX = Math.cos(angle) * velocity; this.speedY = Math.sin(angle) * velocity;
        this.gravity = 0.18; this.alpha = 1; this.decay = Math.random() * 0.015 + 0.012;
    }
    update() { this.speedY += this.gravity; this.x += this.speedX; this.y += this.speedY; this.alpha -= this.decay; }
    draw() { cCtx.save(); cCtx.globalAlpha = this.alpha; cCtx.fillStyle = this.color; cCtx.shadowBlur = 8; cCtx.shadowColor = this.color; cCtx.beginPath(); cCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); cCtx.fill(); cCtx.restore(); }
}
function createExplosion(x, y) {
    const colors = ['#ff4500', '#ff8c00', '#ffd700', '#ff0000', '#ffffff'];
    for (let i = 0; i < 80; i++) cParticles.push(new CrackerParticle(x, y, colors[Math.floor(Math.random() * colors.length)]));
}
function animateCrackers() {
    cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
    for (let i = cParticles.length - 1; i >= 0; i--) { cParticles[i].update(); if (cParticles[i].alpha <= 0) cParticles.splice(i, 1); else cParticles[i].draw(); }
    crackersAnimationId = requestAnimationFrame(animateCrackers);
}
function triggerNativeCrackers() {
    cParticles = []; cancelAnimationFrame(crackersAnimationId); animateCrackers();
    createExplosion(window.innerWidth * 0.2, window.innerHeight * 0.4);
    setTimeout(() => createExplosion(window.innerWidth * 0.8, window.innerHeight * 0.4), 250);
    setTimeout(() => createExplosion(window.innerWidth * 0.5, window.innerHeight * 0.3), 500);
}

window.addEventListener('load', () => {
    initFireBackground();
});

function openMainPointsTable() {
    document.getElementById('porkalamSplash').classList.add('fade-hide');
    fetchAllSheetsData();
    setInterval(fetchAllSheetsData, 2000); // Har 2 second me live auto-sync hota rahega
}
</script>
</body>
</html>
