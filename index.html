<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYT PORKALAM - BGMI Esports Combo Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
<style>
/* Pure page ko block karne wali welcome screen */
.premium-splash {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #050100;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 9999999 !important;
    overflow: hidden;
    transition: opacity 0.6s ease, transform 0.6s ease;
}

/* Fire Background Animation */
.fire-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, rgba(40,10,0,0.6) 0%, #000000 100%);
    pointer-events: none;
}
.fire-particle {
    position: absolute;
    bottom: -20px;
    background: radial-gradient(circle, #ff4500 20%, rgba(255,140,0,0) 70%);
    border-radius: 50%;
    opacity: 0.6;
    animation: riseUp 4s linear infinite;
}
@keyframes riseUp {
    0% { transform: translateY(0) scale(1) translateX(0); opacity: 0.7; }
    50% { transform: translateY(-50vh) scale(1.3) translateX(20px); opacity: 0.4; }
    100% { transform: translateY(-110vh) scale(0.5) translateX(-20px); opacity: 0; }
}

/* TYT PORKALAM Dancing / Glow Text Effect */
.dancing-title {
    color: #ffffff;
    font-size: 46pt;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 30px;
    z-index: 2;
    position: relative;
    text-shadow: 0 0 20px #ff4500, 0 0 40px #ff8c00;
    animation: textDance 3s ease-in-out infinite alternate;
}
@keyframes textDance {
    0% { transform: translateY(0) rotate(-1deg); text-shadow: 0 0 20px #ff4500, 0 0 40px #ff8c00; }
    50% { transform: translateY(-10px) rotate(1deg) scale(1.03); text-shadow: 0 0 30px #ff0000, 0 0 50px #ffd700; }
    100% { transform: translateY(5px) rotate(-0.5deg); text-shadow: 0 0 25px #ff4500, 0 0 45px #ff8c00; }
}

/* Enter Tournament Action Button */
.enter-esports-btn {
    background: linear-gradient(135deg, #ff4500 0%, #b30000 100%);
    color: #ffffff;
    border: 2px solid #ffd700;
    padding: 16px 45px;
    font-size: 16pt;
    font-weight: 800;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    z-index: 2;
    box-shadow: 0 0 25px rgba(255, 69, 0, 0.6);
    transition: all 0.2s ease;
}
.enter-esports-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 45px #ff4500;
    background: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%);
}

/* Smooth Fade Out Class */
.premium-splash.fade-hide {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
}

/* Arrow Styling & Animation */
.pos-change { 
    font-size: 11pt; 
    font-weight: 900; 
    margin-left: 8px; 
    display: inline-block;
    vertical-align: middle;
    animation: arrowPop 0.3s ease-out;
}
@keyframes arrowPop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
.pos-up { color: #00ff66 !important; text-shadow: 0 0 8px rgba(0, 255, 102, 0.6); }
.pos-down { color: #ff3333 !important; text-shadow: 0 0 8px rgba(255, 51, 51, 0.6); }
.table-row { transition: all 0.5s ease; }
</style>

<div id="porkalamSplash" class="premium-splash">
    <div class="fire-bg">
        <div class="fire-particle" style="left:10%; width:15px; height:15px; animation-delay:0s; animation-duration:5s;"></div>
        <div class="fire-particle" style="left:25%; width:22px; height:22px; animation-delay:1.5s; animation-duration:4s;"></div>
        <div class="fire-particle" style="left:45%; width:12px; height:12px; animation-delay:0.5s; animation-duration:6s;"></div>
        <div class="fire-particle" style="left:65%; width:26px; height:26px; animation-delay:2s; animation-duration:4.5s;"></div>
        <div class="fire-particle" style="left:80%; width:18px; height:18px; animation-delay:1s; animation-duration:5.5s;"></div>
    </div>
    
    <div class="dancing-title">TYT PORKALAM</div>
    <button class="enter-esports-btn" onclick="openMainPointsTable()">Enter Tournament</button>
</div>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* 🟢 INTERACTIVE DYNAMIC BACKGROUND MODE CORES */
        body {
            margin: 0;
            padding: 10px 30px; 
            background: radial-gradient(circle at 50% 50%, #1a0500 0%, #050100 100%) !important;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: background 0.8s ease !important;
        }

        body.dashboard-orange-mode {
            background: radial-gradient(circle at 50% 50%, #291100 0%, #080300 100%) !important;
        }

        /* 🌊 BGMI OCEAN ODYSSEY CANVAS ENGINE */
        #odysseyCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 🔮 ULTRA TRANSPARENT & WIDE CONTAINER FOR 8 MATCHES */
        .container {
            width: 100%;
            max-width: 98% !important; 
            background: transparent !important; 
            border: none !important; 
            box-shadow: none !important; 
            position: relative;
            z-index: 2;
            padding-top: 15px;
            transition: all 0.5s ease;
        }

        /* Mode Switcher UI bar */
        .mode-switcher-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 15px;
        }
        .mode-toggle-btn {
            background: rgba(30, 10, 5, 0.6);
            border: 1.5px solid rgba(255, 69, 0, 0.3);
            color: #a0aec0;
            padding: 10px 25px;
            font-size: 11pt;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .mode-toggle-btn.active-tournament {
            background: linear-gradient(135deg, #b30000 0%, #ff4500 100%) !important;
            color: #fff !important;
            border-color: #ffd700 !important;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.5);
        }
        .mode-toggle-btn.active-dashboard {
            background: linear-gradient(135deg, #cc5200 0%, #ff8c00 100%) !important;
            color: #fff !important;
            border-color: #ffea00 !important;
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.5);
        }

        /* Header Layout */
        .header-container {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255, 69, 0, 0.3);
            padding-bottom: 15px;
            position: relative;
        }
        body.dashboard-orange-mode .header-container {
            border-bottom-color: rgba(255, 140, 0, 0.3);
        }

        .main-title {
            font-size: 40pt;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0;
            color: #ffffff !important;
            text-shadow: 0 0 10px #ff4500, 0 0 20px #ff8c00, 0 0 30px #ff0000 !important;
        }
        body.dashboard-orange-mode .main-title {
            text-shadow: 0 0 10px #ff8c00, 0 0 20px #ffa500, 0 0 30px #ff4500 !important;
        }

        .subtitle {
            font-size: 14pt;
            color: #ff007f;
            margin: 6px 0 0 0;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.5);
        }

        .live-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 69, 0, 0.2) !important;
            border: 1px solid #ff4500 !important;
            color: #ffaa66 !important;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.4) !important;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11pt;
            font-weight: bold;
            text-transform: uppercase;
            animation: blink 1s infinite;
        }
        body.dashboard-orange-mode .live-badge {
            background: rgba(255, 140, 0, 0.15) !important;
            border-color: #ff8c00 !important;
            color: #ffbb77 !important;
        }
        @keyframes blink { 50% { opacity: 0.4; } }

        /* Navigation Tabs Control */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(25, 10, 5, 0.8) !important;
            border: 1px solid rgba(255, 69, 0, 0.3) !important;
            color: #cbd5e0 !important;
            padding: 12px 24px;
            font-size: 12pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        
        .tab-btn.hide-tab-logic {
            display: none !important;
        }

        .tab-btn:hover, .tab-btn.active {
            background: linear-gradient(135deg, #ff4500 0%, #ff8c00 100%) !important;
            color: #ffffff !important;
            border: 1px solid #ffd700 !important;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.6) !important;
            transform: translateY(-2px);
        }
        body.dashboard-orange-mode .tab-btn:hover, body.dashboard-orange-mode .tab-btn.active {
            background: linear-gradient(135deg, #cc5200 0%, #ff8c00 100%) !important;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6) !important;
        }

        /* Responsive Grid Enforcers */
        .table-responsive {
            overflow-x: auto;
            display: none;
            width: 100%;
        }

        .table-responsive.active {
            display: block;
        }

        /* 📌 TRANSPARENT GLASSY TABLES */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(12, 4, 2, 0.55) !important; 
            border: 2px solid rgba(255, 69, 0, 0.4) !important;
            backdrop-filter: blur(2px); 
        }
        body.dashboard-orange-mode table {
            border-color: rgba(255, 140, 0, 0.4) !important;
        }

        th {
            background: linear-gradient(180deg, rgba(42,11,3,0.9) 0%, rgba(18,3,0,0.95) 100%) !important;
            border-bottom: 2px solid #ff4500 !important;
            color: #ff8c00 !important;
            font-weight: 800;
            text-transform: uppercase;
            padding: 12px 10px;
            border: 1.5px solid rgba(255, 69, 0, 0.3);
            text-align: center;
            font-size: 11pt;
            white-space: nowrap;
        }
        body.dashboard-orange-mode th {
            background: linear-gradient(180deg, rgba(51,20,0,0.9) 0%, rgba(23,9,0,0.95) 100%) !important;
            border-bottom-color: #ff8c00 !important;
            color: #ffa500 !important;
            border-color: rgba(255, 140, 0, 0.3);
        }

        td {
            padding: 12px 10px;
            border: 1.5px solid rgba(255, 69, 0, 0.25) !important;
            text-align: center;
            color: #ffffff;
            font-size: 11.5pt;
            font-weight: 600;
            text-shadow: 0 1px 4px rgba(0,0,0,0.95);
            white-space: nowrap;
        }
        body.dashboard-orange-mode td {
            border-color: rgba(255, 140, 0, 0.25) !important;
        }

        th.rank-header, td.rank-cell { width: 90px; min-width: 90px; }
        
        /* Fixed Player & Team Names Columns - Clean, Centered & Compact */
        th.team-name-head, td.team-name-cell,
        th.player-name-head, td.player-name-cell { 
            min-width: 180px; 
            max-width: 260px; 
            text-align: center !important; 
            white-space: normal !important; 
            word-break: break-word; 
        }
        
        th.total-points-head, th.top-killer-head, td.neon-score { min-width: 120px; }
        
        td.team-name-cell { border-left: 4px solid #ff4500; }
        td.player-name-cell { border-left: 4px solid #ff007f; }
        body.dashboard-orange-mode td.team-name-cell { border-left-color: #ff8c00; }

        .team-emoji {
            margin-right: 6px;
            display: inline-block;
            font-size: 12pt;
            vertical-align: middle;
        }

        td.neon-score, td.highlight-stat { color: #ffaa44 !important; text-shadow: 0 0 8px rgba(255, 140, 0, 0.6) !important; }
        td.rank-cell { font-family: 'Impact', 'Arial Black', sans-serif; text-shadow: 0 0 8px rgba(255, 170, 0, 0.4); color: #ffaa00; }

        tr:nth-child(even) td { background-color: rgba(30, 15, 10, 0.25); } 
        tr:hover td { background-color: rgba(255, 69, 0, 0.15); } 
        
        tr.rank-1 td { background-color: rgba(255, 69, 0, 0.2) !important; border-bottom: 1px solid #ffd700 !important; }
        tr.rank-1 td.team-name-cell, tr.rank-1 td.player-name-cell { text-shadow: 0 0 8px rgba(255,215,0,0.5); color: #ffd700; }
        tr.rank-1 td.rank-cell { color: #ffd700; }

        tr.rank-2 td { background-color: rgba(192, 192, 192, 0.08) !important; }
        tr.rank-2 td.team-name-cell, tr.rank-2 td.player-name-cell { text-shadow: 0 0 8px rgba(192,192,192,0.4); color: #c0c0c0; }
        tr.rank-2 td.rank-cell { color: #c0c0c0; }

        tr.rank-3 td { background-color: rgba(205, 127, 50, 0.08) !important; }
        tr.rank-3 td.team-name-cell, tr.rank-3 td.player-name-cell { text-shadow: 0 0 8px rgba(205,127,50,0.4); color: #cd7f32; }
        tr.rank-3 td.rank-cell { color: #cd7f32; }

        th.map-header { font-size: 11.5pt; font-weight: 800; background-color: rgba(40, 15, 5, 0.95); color: #ffffff; min-width: 140px; }
        th.sub-th { background-color: rgba(20, 8, 3, 0.85); font-size: 10.5pt; color: #a0aec0; min-width: 70px; }

        .status-message { text-align: center; padding: 30px; color: #a0aec0; font-size: 13pt; font-style: italic; }

        table th, table td {
            font-size: 14pt !important;
            font-weight: 600 !important;
            padding: 9px 8px !important;
        }

        td.rank-cell, td.neon-score, td.highlight-stat {
            font-size: 16pt !important;
            font-weight: 700 !important;
        }

        /* 📊 DASHBOARD LAYOUT MANAGEMENT */
        .compact-dash-cell {
            text-align: center !important;
            white-space: nowrap !important;
        }
        
        #player-stats-tab table, #team-standings-tab table {
            table-layout: auto !important;
        }

        /* POPUP STRUCTURE STYLE */
        .champion-popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 3, 0, 0.95);
            backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 999999 !important;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .champion-popup-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .champion-card {
            background: linear-gradient(135deg, #3a1003 0%, #0c0400 100%);
            border: 3px solid #ff4500;
            box-shadow: 0 0 60px rgba(255, 69, 0, 0.6), inset 0 0 30px rgba(255, 140, 0, 0.3);
            padding: 50px 70px;
            border-radius: 24px;
            text-align: center;
            transform: scale(0.6);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .champion-popup-overlay.show .champion-card {
            transform: scale(1);
        }
        .champion-title {
            color: #ffd700;
            font-size: 22pt;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        .champion-name {
            color: #ffffff;
            font-size: 42pt;
            font-weight: 900;
            margin: 15px 0;
            text-shadow: 0 0 25px #ff4500, 0 0 10px #ffffff;
        }
        .champion-badge {
            font-size: 55pt;
            margin-bottom: 5px;
            animation: firePulse 0.8s infinite alternate;
        }
        @keyframes firePulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #ff4500); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 20px #ff8c00); }
        }

        #crackersCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999999 !important;
        }
    </style>
</head>
<body>

<canvas id="odysseyCanvas"></canvas>

<div class="container">
    
    <div class="mode-switcher-bar">
        <button id="btnTourneyMode" class="mode-toggle-btn active-tournament" onclick="applyOperationMode('tournament')">⚔️ Tournament Mode</button>
        <button id="btnDashboardMode" class="mode-toggle-btn" onclick="applyOperationMode('dashboard')">📊 Dashboard Mode</button>
    </div>

    <div class="header-container">
        <h1 class="main-title">TYT PORKALAM</h1>
        <div class="subtitle">🔥ONLY THE STRONGEST SQUAD WILL SURVIVE🔥</div>
        <div class="live-badge">● Live Sync</div>
    </div>

    <div class="tabs-container">
        <button id="tab-btn-team-points" class="tab-btn active" onclick="switchTab('team-points-tab', this)">🛡️ TEAM POINTS</button>
        <button id="tab-btn-player-kills" class="tab-btn" onclick="switchTab('player-kills-tab', this)">🎯 PLAYER KILLS</button>
        <button id="tab-btn-player-stats" class="tab-btn" onclick="switchTab('player-stats-tab', this)">📊 PLAYER STATS</button>
        <button id="tab-btn-team-standings" class="tab-btn" onclick="switchTab('team-standings-tab', this)">🏆 TEAM STANDINGS</button>
    </div>

    <div id="team-points-tab" class="table-responsive active">
        <table>
            <thead id="team-points-head"></thead>
            <tbody id="team-points-body">
                <tr><td class="status-message">LOADING MAPS METRICS...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="player-kills-tab" class="table-responsive">
        <table>
            <thead id="player-kills-head"></thead>
            <tbody id="player-kills-body">
                <tr><td class="status-message">KILLS DATABASE STREAMING...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="player-stats-tab" class="table-responsive">
        <table>
            <thead id="player-stats-head"></thead>
            <tbody id="player-stats-body">
                <tr><td class="status-message">SYNCHRONIZING PLAYER STATS RECORDS...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="team-standings-tab" class="table-responsive">
        <table>
            <thead id="team-standings-head"></thead>
            <tbody id="team-standings-body">
                <tr><td class="status-message">CONNECTING TO STANDINGS PIPELINE...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<canvas id="crackersCanvas"></canvas>
<div id="championPopup" class="champion-popup-overlay">
    <div class="champion-card">
        <div class="champion-badge">👑🔥</div>
        <div class="champion-title" id="popHeaderType">CURRENT #1 LEADER</div>
        <div class="champion-name" id="popLeaderName">LOADING...</div>
    </div>
</div>

<script>
    const REALTIME_API_URL = "https://script.google.com/macros/s/AKfycbyuMwMTwfZH6nh9r7f7F4wA6t0XgPbgRQLNvAxQkfv9ExAVTN3NHjmjDBP4S_VxSNN4_w/exec";

    if (!window.rankMemory) {
        window.rankMemory = {
            teamPoints: {},
            playerKills: {},
            playerStats: {},
            teamStandings: {}
        };
    }

    function applyOperationMode(mode) {
        const body = document.body;
        const btnTourney = document.getElementById('btnTourneyMode');
        const btnDashboard = document.getElementById('btnDashboardMode');
        
        const tabPointsBtn = document.getElementById('tab-btn-team-points');
        const tabKillsBtn = document.getElementById('tab-btn-player-kills');
        const tabStatsBtn = document.getElementById('tab-btn-player-stats');
        const tabStandingsBtn = document.getElementById('tab-btn-team-standings');

        if (mode === 'dashboard') {
            body.classList.add('dashboard-orange-mode');
            btnTourney.className = 'mode-toggle-btn';
            btnDashboard.className = 'mode-toggle-btn active-dashboard';

            tabPointsBtn.classList.add('hide-tab-logic');
            tabKillsBtn.classList.add('hide-tab-logic');
            tabStatsBtn.classList.remove('hide-tab-logic');
            tabStandingsBtn.classList.remove('hide-tab-logic');

            switchTab('player-stats-tab', tabStatsBtn);
        } else {
            body.classList.remove('dashboard-orange-mode');
            btnTourney.className = 'mode-toggle-btn active-tournament';
            btnDashboard.className = 'mode-toggle-btn';

            tabPointsBtn.classList.remove('hide-tab-logic');
            tabKillsBtn.classList.remove('hide-tab-logic');
            tabStatsBtn.classList.add('hide-tab-logic');
            tabStandingsBtn.classList.add('hide-tab-logic');

            switchTab('team-points-tab', tabPointsBtn);
        }
    }

    function calculateRankArrow(storageKey, identifier, currentRank) {
        if (!identifier) return '';
        let arrowHTML = '';
        let oldRank = window.rankMemory[storageKey][identifier];
        
        if (oldRank !== undefined) {
            if (currentRank < oldRank) {
                arrowHTML = `<span class="pos-change pos-up">↑${oldRank - currentRank}</span>`;
            } else if (currentRank > oldRank) {
                arrowHTML = `<span class="pos-change pos-down">↓${currentRank - oldRank}</span>`;
            }
        }
        window.rankMemory[storageKey][identifier] = currentRank;
        return arrowHTML;
    }

    const canvas = document.getElementById('odysseyCanvas');
    const ctx = canvas.getContext('2d');
    let fishSchool = [], vortexAngle = 0;

    function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', initCanvas); initCanvas();

    let whaleTop = { x: -450, y: canvas.height * 0.22, speed: 1.1, swing: 0, swingSpeed: 0.025, sizeScale: 0.9 };
    let whaleBottom = { x: canvas.width + 500, y: canvas.height * 0.75, speed: -0.9, swing: 3.5, swingSpeed: 0.02, sizeScale: 1.2 };

    for (let i = 0; i < 22; i++) {
        fishSchool.push({
            x: Math.random() * canvas.width + canvas.width * 0.2, y: Math.random() * canvas.height,
            size: Math.random() * 7 + 5, speed: Math.random() * 1.5 + 1.0,
            waveFactor: Math.random() * 10, waveSpeed: Math.random() * 0.05 + 0.03
        });
    }

    function drawWhaleVector(x, y, swing, scale, invertedFactor) {
        let tailWave = Math.sin(swing); ctx.save(); ctx.translate(x, y); ctx.scale(invertedFactor * scale, scale);
        ctx.strokeStyle = "rgba(255, 69, 0, 0.12)"; ctx.lineWidth = 3; ctx.shadowBlur = 15; ctx.shadowColor = "#ff4500";
        ctx.beginPath(); ctx.moveTo(150, 0); ctx.bezierCurveTo(80, -60, -50, -50, -120, tailWave * 15);
        ctx.lineTo(-160, (tailWave * 15) - 35); ctx.lineTo(-145, tailWave * 15); ctx.lineTo(-160, (tailWave * 15) + 35);
        ctx.lineTo(-120, tailWave * 15); ctx.bezierCurveTo(-50, 60, 80, 55, 150, 0); ctx.stroke(); ctx.restore();
    }

    function renderOdysseyWorld() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        vortexAngle += 0.002;
        ctx.save(); ctx.translate(canvas.width * 0.12, canvas.height * 0.5);
        for(let i = 0; i < 6; i++) {
            ctx.strokeStyle = `rgba(255, 69, 0, ${0.025 - (i * 0.004)})`; ctx.lineWidth = 25 - (i * 3);
            ctx.save(); ctx.rotate(vortexAngle * (1 + i * 0.15)); ctx.beginPath(); ctx.ellipse(0, 0, 80 + (i * 22), 240 + (i * 35), 0, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
        }
        ctx.restore();

        ctx.fillStyle = "rgba(255, 140, 0, 0.15)";
        fishSchool.forEach(fish => {
            fish.waveFactor += fish.waveSpeed; fish.x -= fish.speed; fish.y += Math.sin(fish.waveFactor) * 0.5;
            if (fish.x < -60) { fish.x = canvas.width + 60; fish.y = Math.random() * canvas.height; }
            ctx.save(); ctx.translate(fish.x, fish.y); ctx.rotate(Math.PI + Math.sin(fish.waveFactor) * 0.1);
            ctx.beginPath(); ctx.moveTo(fish.size * 2, 0); ctx.quadraticCurveTo(fish.size, -fish.size * 0.4, 0, 0); ctx.quadraticCurveTo(fish.size, fish.size * 0.4, fish.size * 2, 0); ctx.closePath(); ctx.fill(); ctx.restore();
        });

        drawWhaleVector(whaleTop.x, whaleTop.y, whaleTop.swing, whaleTop.sizeScale, 1);
        drawWhaleVector(whaleBottom.x, whaleBottom.y, whaleBottom.swing, whaleBottom.sizeScale, -1);
        whaleTop.x += whaleTop.speed; whaleTop.swing += whaleTop.swingSpeed; if (whaleTop.x > canvas.width + 500) whaleTop.x = -500;
        whaleBottom.x += whaleBottom.speed; whaleBottom.swing += whaleBottom.swingSpeed; if (whaleBottom.x < -600) whaleBottom.x = canvas.width + 600;
        requestAnimationFrame(renderOdysseyWorld);
    }
    requestAnimationFrame(renderOdysseyWorld);

    function getTeamEmoji(teamName) {
        if (!teamName) return '🎮';
        const name = teamName.toUpperCase();
        if (name.includes('CAMP')) return '⛺';
        if (name.includes('HUNT')) return '🏹';
        if (name.includes('EVEN') || name.includes('SQUAD')) return '🌆';
        if (name.includes('MEDIC')) return '🩺';
        if (name.includes('MATRIX')) return '🔮';
        if (name.includes('BOT')) return '🤖';
        if (name.includes('THUND')) return '⚡';
        return '⚔️'; 
    }

    function getRankBadgeHTML(rankNum) {
        if (rankNum === 1) return '🥇';
        if (rankNum === 2) return '🥈';
        if (rankNum === 3) return '🥉';
        return rankNum;
    }

    function switchTab(tabId, button) {
        document.querySelectorAll('.table-responsive').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        button.classList.add('active');
    }

    async function fetchAllSheetsData() {
        try {
            const response = await fetch(`${REALTIME_API_URL}?_=${new Date().getTime()}`);
            const allData = await response.json();
            
            buildUniversalMasterGrid(allData.teamPoints, 'team-points-head', 'team-points-body');
            buildPlayerKillsGrid(allData.playerKills, 'player-kills-head', 'player-kills-body');
            buildPlayerStatsGrid(allData.playerStats, 'player-stats-head', 'player-stats-body');
            buildTeamStandingsGrid(allData.teamStandings, 'team-standings-head', 'team-standings-body');
        } catch (error) { console.error("Sync error:", error); }
    }

    function buildUniversalMasterGrid(rows, headId, bodyId) {
        if (!rows || rows.length < 2) return;
        const thead = document.getElementById(headId);
        const tbody = document.getElementById(bodyId);
        
        const isHeaderDeleted = rows[0][0] && rows[0][0].toString().toUpperCase().includes("S:NO");
        const startRowIdx = isHeaderDeleted ? 0 : 1;
        const headerRow = rows[startRowIdx];

        if (!headerRow) return;

        const totalColumns = headerRow.length;
        const totalPointsIdx = totalColumns - 2; 
        const topKillerIdx = totalColumns - 1;   

        let headHTML = '<tr><th rowspan="2" class="rank-header">RANK</th>';
        headerRow.forEach((col, index) => {
            if (index === 1) headHTML += `<th rowspan="2" class="team-name-head">TEAM NAME</th>`;
            else if (index > 1 && index < totalPointsIdx && index % 2 === 0) {
                headHTML += `<th colspan="2" class="map-header">${col || ''}</th>`;
            }
            else if (index === totalPointsIdx) headHTML += `<th rowspan="2" class="total-points-head">TOTAL POINTS</th>`;
            else if (index === topKillerIdx) headHTML += `<th rowspan="2" class="top-killer-head">TOP KILLER</th>`;
        });
        headHTML += '</tr><tr>';
        
        if (rows[startRowIdx + 1]) {
            rows[startRowIdx + 1].forEach((col, index) => {
                if (index > 1 && index < totalPointsIdx) headHTML += `<th class="sub-th">${col || ''}</th>`;
            });
        }
        headHTML += '</tr>';
        thead.innerHTML = headHTML;

        tbody.innerHTML = '';
        let currentRank = 1;
        for (let i = (startRowIdx + 2); i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[1] || row[1].toString().trim() === "" || row[0] === "TOTAL POINTS") continue;
            
            const tr = document.createElement('tr');
            tr.classList.add(`rank-${currentRank}`, 'table-row');
            
            let tName = row[1].toString().trim();
            let arrow = calculateRankArrow('teamPoints', tName, currentRank);
            
            let rowCells = `<td class="rank-cell">${getRankBadgeHTML(currentRank)}${arrow}</td>`;
            rowCells += `<td class="team-name-cell"><span class="team-emoji">${getTeamEmoji(tName)}</span>${row[1] || '-'}</td>`;
            
            for (let j = 2; j < totalColumns; j++) {
                if (j === totalPointsIdx) {
                    rowCells += `<td class="neon-score">${row[j] !== undefined ? row[j] : '-'}</td>`;
                } else if (j === topKillerIdx) {
                    rowCells += `<td style="font-size:10.5pt;">${row[j] !== undefined ? row[j] : '-'}</td>`;
                } else {
                    rowCells += `<td>${row[j] !== undefined ? row[j] : '-'}</td>`;
                }
            }
            tr.innerHTML = rowCells;
            tbody.appendChild(tr);
            currentRank++;
        }
    }

    function buildPlayerKillsGrid(rows, headId, bodyId) {
        if (!rows || rows.length === 0) return;
        const thead = document.getElementById(headId);
        const tbody = document.getElementById(bodyId);

        let startRowIdx = 0;
        if (rows[0][0] && rows[0][0].toString().toUpperCase().includes("TYT PORKALAM")) {
            startRowIdx = 1; 
        }

        const headerRow = rows[startRowIdx];
        const numCols = headerRow.length;

        let headHTML = `<tr><th class="rank-header">RANK</th><th class="player-name-head">${headerRow[0] || 'PLAYER NAME'}</th>`;
        for(let c = 1; c < numCols - 1; c++) {
            headHTML += `<th>${headerRow[c] || 'MATCH'}</th>`;
        }
        headHTML += `<th class="total-points-head">${headerRow[numCols - 1] || 'TOTAL KILLS'}</th></tr>`;
        thead.innerHTML = headHTML;

        tbody.innerHTML = '';
        let currentRank = 1;
        for (let i = startRowIdx + 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[0] || row[0].toString().trim() === "" || row[0].toString().toUpperCase().includes("PLAYER NAME")) continue;

            const tr = document.createElement('tr');
            tr.classList.add(`rank-${currentRank}`, 'table-row');

            let pName = row[0].toString().trim();
            let arrow = calculateRankArrow('playerKills', pName, currentRank);

            let cellHTML = `<td class="rank-cell">${getRankBadgeHTML(currentRank)}${arrow}</td>`;
            cellHTML += `<td class="player-name-cell"><span class="team-emoji">🎯</span>${row[0] || '-'}</td>`;
            for(let d = 1; d < numCols - 1; d++) {
                cellHTML += `<td>${row[d] !== undefined ? row[d] : '-'}</td>`;
            }
            cellHTML += `<td class="neon-score">${row[numCols - 1] !== undefined ? row[numCols - 1] : '-'}</td>`;

            tr.innerHTML = cellHTML;
            tbody.appendChild(tr);
            currentRank++;
        }
    }

    function buildPlayerStatsGrid(rows, headId, bodyId) {
        if (!rows || rows.length === 0) return;
        const thead = document.getElementById(headId);
        const tbody = document.getElementById(bodyId);

        let startRowIdx = 0;
        if (rows[0][0] && rows[0][0].toString().toUpperCase().includes("TYT PORKALAM")) {
            startRowIdx = 1; 
        }

        const headerRow = rows[startRowIdx];
        const hasSNo = headerRow[0] && headerRow[0].toString().toUpperCase().includes("S:");
        const startIdx = hasSNo ? 1 : 0;
        const numCols = headerRow.length;

        let headHTML = `<tr><th class="rank-header">RANK</th><th class="player-name-head">${headerRow[startIdx] || 'PLAYER NAME'}</th>`;
        for (let c = startIdx + 1; c < numCols; c++) {
            headHTML += `<th class="compact-dash-cell">${headerRow[c] || 'STAT'}</th>`;
        }
        headHTML += `</tr>`;
        thead.innerHTML = headHTML;
        
        tbody.innerHTML = '';
        let currentRank = 1;
        for (let i = startRowIdx + 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[startIdx] || row[startIdx].toString().trim() === "" || row[startIdx].toString().toUpperCase().includes("PLAYER NAME")) continue;
            
            const tr = document.createElement('tr');
            tr.classList.add(`rank-${currentRank}`, 'table-row');
            
            let psName = row[startIdx].toString().trim();
            let arrow = calculateRankArrow('playerStats', psName, currentRank);
            
            let cellHTML = `<td class="rank-cell">${getRankBadgeHTML(currentRank)}${arrow}</td>`;
            cellHTML += `<td class="player-name-cell"><span class="team-emoji">👤</span>${row[startIdx] || '-'}</td>`;
            
            for (let d = startIdx + 1; d < numCols; d++) {
                let cellValue = row[d];
                if (d === numCols - 1 && cellValue !== undefined && !isNaN(cellValue) && cellValue !== "") {
                    cellValue = Number(cellValue).toFixed(2);
                }

                if (d === startIdx + 2) {
                    cellHTML += `<td class="neon-score compact-dash-cell">${cellValue !== undefined ? cellValue : '-'}</td>`;
                } else if (d === numCols - 1) {
                    cellHTML += `<td class="highlight-stat compact-dash-cell">${cellValue !== undefined ? cellValue : '-'}</td>`;
                } else {
                    cellHTML += `<td class="compact-dash-cell">${cellValue !== undefined ? cellValue : '-'}</td>`;
                }
            }
            
            tr.innerHTML = cellHTML;
            tbody.appendChild(tr);
            currentRank++;
        }
    }

    function buildTeamStandingsGrid(rows, headId, bodyId) {
        if (!rows || rows.length === 0) return;
        const thead = document.getElementById(headId);
        const tbody = document.getElementById(bodyId);

        let startRowIdx = 0;
        if (rows[0][0] && rows[0][0].toString().toUpperCase().includes("TYT PORKALAM")) {
            startRowIdx = 1;
        }

        const headerRow = rows[startRowIdx];
        const hasRankCol = headerRow[0] && headerRow[0].toString().toUpperCase().includes("RANK");
        const startIdx = hasRankCol ? 1 : 0;
        const numCols = headerRow.length;

        let headHTML = `<tr><th class="rank-header">RANK</th><th class="team-name-head">${headerRow[startIdx] || 'TEAM NAME'}</th>`;
        for (let c = startIdx + 1; c < numCols; c++) {
            headHTML += `<th class="compact-dash-cell">${headerRow[c] || 'DATA'}</th>`;
        }
        headHTML += `</tr>`;
        thead.innerHTML = headHTML;

        tbody.innerHTML = '';
        let currentRank = 1;
        
        for (let i = startRowIdx + 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[startIdx] || row[startIdx].toString().trim() === "" || row[startIdx].toString().trim() === "0") continue;

            const tr = document.createElement('tr');
            tr.classList.add(`rank-${currentRank}`, 'table-row');

            let tsName = row[startIdx].toString().trim();
            let arrow = calculateRankArrow('teamStandings', tsName, currentRank);

            let cellHTML = `<td class="rank-cell">${getRankBadgeHTML(currentRank)}${arrow}</td>`;
            cellHTML += `<td class="team-name-cell"><span class="team-emoji">${getTeamEmoji(tsName)}</span>${row[startIdx]}</td>`;

            for (let d = startIdx + 1; d < numCols; d++) {
                let cellValue = row[d];
                if (d === numCols - 1 && cellValue !== undefined && !isNaN(cellValue) && cellValue !== '') {
                    cellValue = Number(cellValue).toFixed(2);
                }
                
                if (d === startIdx + 3) { 
                    cellHTML += `<td class="neon-score compact-dash-cell">${cellValue !== undefined ? cellValue : 0}</td>`;
                } else if (d === numCols - 1) { 
                    cellHTML += `<td class="highlight-stat compact-dash-cell">${cellValue !== undefined ? cellValue : 0}</td>`;
                } else {
                    cellHTML += `<td class="compact-dash-cell">${cellValue !== undefined ? cellValue : 0}</td>`;
                }
            }

            tr.innerHTML = cellHTML;
            tbody.appendChild(tr);
            currentRank++;
        }
    }
</script>

<script>
function initFireBackground() {
    const canvas = document.getElementById('odysseyCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 100;
            this.size = Math.random() * 3 + 1;
            this.speedY = Math.random() * 1.5 + 0.5;
            this.speedX = Math.random() * 1 - 0.5;
            this.opacity = Math.random() * 0.5 + 0.5;
        }
        update() {
            this.y -= this.speedY;
            this.x += this.speedX;
            if (this.y < -10) {
                this.y = canvas.height + 10;
                this.x = Math.random() * canvas.width;
            }
        }
        draw() {
            ctx.fillStyle = `rgba(255, ${Math.floor(Math.random() * 100) + 50}, 0, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    for (let i = 0; i < 50; i++) particles.push(new Particle());

    function animate() {
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
}

const cCanvas = document.getElementById('crackersCanvas');
const cCtx = cCanvas.getContext('2d');
let cParticles = [];
let crackersAnimationId;

function resizeCrackersCanvas() {
    cCanvas.width = window.innerWidth;
    cCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCrackersCanvas);
resizeCrackersCanvas();

class CrackerParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.radius = Math.random() * 4 + 2;
        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 12 + 4;
        this.speedX = Math.cos(angle) * velocity;
        this.speedY = Math.sin(angle) * velocity;
        this.gravity = 0.2; this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.015;
    }
    update() { this.speedY += this.gravity; this.x += this.speedX; this.y += this.speedY; this.alpha -= this.decay; }
    draw() {
        cCtx.save(); cCtx.globalAlpha = this.alpha; cCtx.fillStyle = this.color;
        cCtx.shadowBlur = 10; cCtx.shadowColor = this.color;
        cCtx.beginPath(); cCanvas.getContext('2d'); cCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); cCtx.fill(); cCtx.restore();
    }
}

function createExplosion(x, y) {
    const colors = ['#ff4500', '#ff8c00', '#ffd700', '#ff0000', '#ffffff'];
    for (let i = 0; i < 100; i++) {
        cParticles.push(new CrackerParticle(x, y, colors[Math.floor(Math.random() * colors.length)]));
    }
}

function animateCrackers() {
    cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
    for (let i = cParticles.length - 1; i >= 0; i--) {
        cParticles[i].update();
        if (cParticles[i].alpha <= 0) cParticles.splice(i, 1);
        else cParticles[i].draw();
    }
    crackersAnimationId = requestAnimationFrame(animateCrackers);
}

function triggerNativeCrackers() {
    cParticles = [];
    cancelAnimationFrame(crackersAnimationId);
    animateCrackers();
    createExplosion(window.innerWidth * 0.2, window.innerHeight * 0.4);
    setTimeout(() => createExplosion(window.innerWidth * 0.8, window.innerHeight * 0.4), 250);
    setTimeout(() => createExplosion(window.innerWidth * 0.5, window.innerHeight * 0.3), 500);
}

let lastWinnerCache = {};
function triggerTabCelebration(tabId, tabName) {
    setTimeout(() => {
        const gridContainer = document.getElementById(tabId);
        if (!gridContainer) return;
        const firstRow = gridContainer.querySelector('tbody tr');
        if (!firstRow) return;
        const allCells = firstRow.querySelectorAll('td');
        if (allCells.length < 2) return;
        
        let winnerName = allCells[1].innerText || allCells[1].textContent;
        winnerName = winnerName.replace(/[🥇🥈🥉⭐👑🎖️🔥]/g, '').trim();
        if (winnerName.includes('\n')) winnerName = winnerName.split('\n')[0];

        if (!winnerName || winnerName.toUpperCase() === "LOADING...") return;

        if (lastWinnerCache[tabId] !== winnerName) {
            lastWinnerCache[tabId] = winnerName;
            document.getElementById('popHeaderType').innerText = tabName + " #1 LEADER";
            document.getElementById('popLeaderName').innerText = winnerName;
            const popup = document.getElementById('championPopup');
            popup.classList.add('show');
            triggerNativeCrackers();
            setTimeout(() => popup.classList.remove('show'), 3000);
        }
    }, 600);
}

const originalSwitchTab = window.switchTab;
window.switchTab = function(tabId, button) {
    if (typeof originalSwitchTab === 'function') originalSwitchTab(tabId, button);
    let cleanName = "TEAM POINTS";
    if (tabId.includes('kill')) cleanName = "PLAYER KILLS";
    if (tabId.includes('stat')) cleanName = "PLAYER STATS";
    if (tabId.includes('standing')) cleanName = "TEAM STANDINGS";
    triggerTabCelebration(tabId, cleanName);
};

window.addEventListener('load', () => {
    initFireBackground();
    applyOperationMode('tournament');
});

function openMainPointsTable() {
    document.getElementById('porkalamSplash').classList.add('fade-hide');
    if (typeof fetchAllSheetsData === 'function') fetchAllSheetsData();
}

if (typeof fetchAllSheetsData === 'function') {
    fetchAllSheetsData();
    setInterval(fetchAllSheetsData, 1000); 
}
</script>
