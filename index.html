<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYT PORKALAM - BGMI Esports Combo Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .premium-splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999999 !important;
            overflow: hidden;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .fire-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(40,10,0,0.6) 0%, #000000 100%);
            pointer-events: none;
        }
        .fire-particle {
            position: absolute;
            bottom: -20px;
            background: radial-gradient(circle, #ff4500 20%, rgba(255,140,0,0) 70%);
            border-radius: 50%;
            opacity: 0.6;
            animation: riseUp 4s linear infinite;
        }
        @keyframes riseUp {
            0% { transform: translateY(0) scale(1) translateX(0); opacity: 0.7; }
            50% { transform: translateY(-50vh) scale(1.3) translateX(20px); opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(0.5) translateX(-20px); opacity: 0; }
        }
        .dancing-title {
            color: #ffffff; font-size: 46pt; font-weight: 900; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 30px; z-index: 2; position: relative; text-shadow: 0 0 20px #ff4500, 0 0 40px #ff8c00; animation: textDance 3s ease-in-out infinite alternate;
        }
        @keyframes textDance {
            0% { transform: translateY(0) rotate(-1deg); text-shadow: 0 0 20px #ff4500, 0 0 40px #ff8c00; }
            50% { transform: translateY(-10px) rotate(1deg) scale(1.03); text-shadow: 0 0 30px #ff0000, 0 0 50px #ffd700; }
            100% { transform: translateY(5px) rotate(-0.5deg); text-shadow: 0 0 25px #ff4500, 0 0 45px #ff8c00; }
        }
        .enter-esports-btn {
            background: linear-gradient(135deg, #ff4500 0%, #b30000 100%); color: #ffffff; border: 2px solid #ffd700; padding: 16px 45px; font-size: 16pt; font-weight: 800; text-transform: uppercase; border-radius: 6px; cursor: pointer; z-index: 2; box-shadow: 0 0 25px rgba(255, 69, 0, 0.6); transition: all 0.2s ease;
        }
        .enter-esports-btn:hover { transform: scale(1.08); box-shadow: 0 0 45px #ff4500; background: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%); }
        .premium-splash.fade-hide { opacity: 0; transform: scale(1.05); pointer-events: none; }
        .pos-change { font-size: 11pt; font-weight: 900; margin-left: 8px; display: inline-block; vertical-align: middle; }
        .pos-up { color: #00ff66 !important; }
        .pos-down { color: #ff3333 !important; }
        .table-row { transition: all 0.5s ease; }
    </style>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body { margin: 0; padding: 10px 20px; background: radial-gradient(circle at 50% 50%, #1a0500 0%, #050100 100%) !important; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; position: relative; overflow-x: hidden; }
        body.dashboard-orange-mode { background: radial-gradient(circle at 50% 50%, #291100 0%, #080300 100%) !important; }
        body.results-purple-mode { background: radial-gradient(circle at 50% 50%, #15002b 0%, #05000d 100%) !important; }
        #odysseyCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { width: 100% !important; max-width: 1400px !important; position: relative; z-index: 2; padding-top: 15px; display: flex; flex-direction: column; align-items: center; }
        .mode-switcher-bar { display: flex; justify-content: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap; }
        .mode-toggle-btn { background: rgba(30, 10, 5, 0.6); border: 1.5px solid rgba(255, 69, 0, 0.3); color: #a0aec0; padding: 10px 25px; font-size: 11pt; font-weight: 800; text-transform: uppercase; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; }
        .mode-toggle-btn.active-tournament { background: linear-gradient(135deg, #b30000 0%, #ff4500 100%) !important; color: #fff !important; border-color: #ffd700 !important; box-shadow: 0 0 15px rgba(255, 69, 0, 0.5); }
        .mode-toggle-btn.active-dashboard { background: linear-gradient(135deg, #cc5200 0%, #ff8c00 100%) !important; color: #fff !important; border-color: #ffea00 !important; box-shadow: 0 0 15px rgba(255, 140, 0, 0.5); }
        .mode-toggle-btn.active-results { background: linear-gradient(135deg, #4b0082 0%, #8a2be2 100%) !important; color: #fff !important; border-color: #e0b0ff !important; box-shadow: 0 0 15px rgba(138, 43, 226, 0.5); }
        
        .header-container { text-align: center; margin-bottom: 25px; border-bottom: 2px solid rgba(255, 69, 0, 0.3); padding-bottom: 15px; position: relative; width: 100%; }
        body.dashboard-orange-mode .header-container { border-bottom-color: rgba(255, 140, 0, 0.3); }
        body.results-purple-mode .header-container { border-bottom-color: rgba(138, 43, 226, 0.4); }
        .main-title { font-size: 40pt; font-weight: 900; text-transform: uppercase; letter-spacing: 6px; margin: 0; text-shadow: 0 0 10px #ff4500, 0 0 20px #ff8c00, 0 0 30px #ff0000 !important; }
        body.dashboard-orange-mode .main-title { text-shadow: 0 0 10px #ff8c00, 0 0 20px #ffa500, 0 0 30px #ff4500 !important; }
        body.results-purple-mode .main-title { text-shadow: 0 0 10px #8a2be2, 0 0 20px #d8bfd8, 0 0 30px #4b0082 !important; }
        
        .subtitle { font-size: 14pt; color: #ff007f; margin: 6px 0 0 0; font-weight: bold; text-shadow: 0 0 8px rgba(255, 0, 127, 0.5); }
        .live-badge { position: absolute; top: 10px; right: 10px; background: rgba(255, 69, 0, 0.2) !important; border: 1px solid #ff4500 !important; color: #ffaa66 !important; padding: 6px 14px; border-radius: 20px; font-size: 11pt; font-weight: bold; text-transform: uppercase; }
        
        .tabs-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { background: rgba(25, 10, 5, 0.8) !important; border: 1px solid rgba(255, 69, 0, 0.3) !important; color: #cbd5e0 !important; padding: 12px 24px; font-size: 12pt; font-weight: 700; text-transform: uppercase; border-radius: 8px; cursor: pointer; transition: all 0.25s ease; }
        .tab-btn.hide-tab-logic { display: none !important; }
        .tab-btn:hover, .tab-btn.active { background: linear-gradient(135deg, #ff4500 0%, #ff8c00 100%) !important; color: #ffffff !important; border: 1px solid #ffd700 !important; box-shadow: 0 0 20px rgba(255, 69, 0, 0.6) !important; transform: translateY(-2px); }
        
        .table-responsive { overflow-x: auto; display: none; width: 100%; margin: 0 auto; }
        .table-responsive.active { display: block; }
        .compact-sheet-view { width: auto !important; max-width: fit-content !important; }
        
        /* SCREENSHOT SPREADSHEET LOOK GRID STYLING */
        table { table-layout: fixed !important; width: 100%; border-collapse: collapse; background-color: rgba(12, 4, 2, 0.95) !important; border: 2px solid #555555 !important; margin: 0 auto; }
        th { background: #222222 !important; border: 1.5px solid #555555 !important; color: #ffffff !important; font-weight: 800; text-transform: uppercase; padding: 12px 8px !important; text-align: center; font-size: 12pt !important; white-space: nowrap; }
        td { padding: 12px 8px !important; border: 1.5px solid #555555 !important; text-align: center; color: #ffffff; font-size: 12.5pt !important; font-weight: 600; white-space: nowrap; }
        
        .rank-header, .rank-cell { width: 85px !important; font-weight: bold; color: #ffffff !important; }
        .team-name-head, .team-name-cell { width: 30% !important; text-align: left !important; padding-left: 15px !important; }
        .player-name-head, .player-name-cell { width: 220px !important; text-align: left !important; padding-left: 15px !important; }
        
        /* TOTAL POINTS COLUMN STYLING EXACT MATCH WITH BORDER */
        .total-points-head, td.total-points-cell { 
            width: 140px !important; 
            font-weight: 800 !important;
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1.5px solid #555555 !important;
        }

        .top-killer-head { width: 180px !important; text-align: left !important; padding-left: 15px !important; }
        th.map-header { font-size: 12pt; font-weight: 800; background-color: #333333 !important; color: #ffffff; }
        
        tr:hover td { background-color: rgba(255, 255, 255, 0.1) !important; }
        .status-message { text-align: center; padding: 30px; color: #a0aec0; font-size: 13pt; font-style: italic; }
        
        /* RECENT RESULTS CARDS STYLING */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; padding: 10px; }
        .result-card { background: linear-gradient(135deg, rgba(20, 5, 35, 0.85) 0%, rgba(5, 1, 15, 0.95) 100%); border: 2px solid #8a2be2; border-radius: 16px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); position: relative; overflow: hidden; border-top: 5px solid #d8bfd8; }
        .card-date { position: absolute; top: 12px; right: 15px; font-size: 9.5pt; color: #d8bfd8; font-weight: 700; background: rgba(138, 43, 226, 0.3); padding: 4px 10px; border-radius: 12px; border: 1px solid rgba(216, 191, 216, 0.4); }
        .card-title { font-size: 18pt; font-weight: 800; color: #ffffff; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; max-width: 70%; }
        .card-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(138, 43, 226, 0.2); }
        .card-row:last-child { border-bottom: none; }
        .row-label { font-size: 11pt; color: #a0aec0; font-weight: bold; text-transform: uppercase; }
        .row-value { font-size: 13pt; font-weight: 700; color: #ffffff; }

        .champion-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 3, 0, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 999999 !important; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .champion-popup-overlay.show { opacity: 1; pointer-events: auto; }
        .champion-card { background: linear-gradient(135deg, #3a1003 0%, #0c0400 100%); border: 3px solid #ff4500; padding: 50px 70px; border-radius: 24px; text-align: center; transform: scale(0.6); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .champion-popup-overlay.show .champion-card { transform: scale(1); }
        .champion-title { color: #ffd700; font-size: 22pt; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .champion-name { color: #ffffff; font-size: 42pt; font-weight: 900; margin: 15px 0; }
        #crackersCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999999 !important; }

    @media screen and (max-width: 768px) {
        body { padding: 5px 4px !important; }
        .container { width: 100% !important; max-width: 100% !important; padding: 4px !important; margin: 0 auto !important; }
        .table-responsive { display: block !important; width: 100% !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; }
        table { width: 100% !important; table-layout: auto !important; }
        table th, table td { padding: 8px 6px !important; font-size: 10pt !important; }
        .rank-header, .rank-cell { width: 55px !important; }
        .team-name-head, .team-name-cell, .player-name-head, .player-name-cell { min-width: 130px !important; white-space: normal !important; }
        .total-points-head, td.total-points-cell { min-width: 100px !important; }
    }
    </style>
</head>
<body>

<canvas id="odysseyCanvas"></canvas>

<div id="porkalamSplash" class="premium-splash">
    <div class="fire-bg">
        <div class="fire-particle" style="left:10%; width:15px; height:15px; animation-delay:0s; animation-duration:5s;"></div>
        <div class="fire-particle" style="left:25%; width:22px; height:22px; animation-delay:1.5s; animation-duration:4s;"></div>
        <div class="fire-particle" style="left:45%; width:12px; height:12px; animation-delay:0.5s; animation-duration:6s;"></div>
        <div class="fire-particle" style="left:65%; width:26px; height:26px; animation-delay:2s; animation-duration:4.5s;"></div>
        <div class="fire-particle" style="left:80%; width:18px; height:18px; animation-delay:1s; animation-duration:5.5s;"></div>
    </div>
    <div class="dancing-title">TYT PORKALAM</div>
    <button class="enter-esports-btn" onclick="openMainPointsTable()">Enter Tournament</button>
</div>

<div class="container">
    <div class="mode-switcher-bar">
        <button id="btnTourneyMode" class="mode-toggle-btn active-tournament" onclick="applyOperationMode('tournament')">⚔️ Tournament Mode</button>
        <button id="btnDashboardMode" class="mode-toggle-btn" onclick="applyOperationMode('dashboard')">📊 Dashboard Mode</button>
        <button id="btnResultsMode" class="mode-toggle-btn" onclick="applyOperationMode('results')">⏳ Recent Results</button>
    </div>

    <div class="header-container">
        <h1 class="main-title">TYT PORKALAM</h1>
        <div class="subtitle">🔥ONLY THE STRONGEST SQUAD WILL SURVIVE🔥</div>
        <div class="live-badge">● Live Sync</div>
    </div>

    <div class="tabs-container" id="mainTabsContainer">
        <button id="tab-btn-team-points" class="tab-btn active" onclick="switchTab('team-points-tab', this)">🛡️ TEAM POINTS</button>
        <button id="tab-btn-player-kills" class="tab-btn" onclick="switchTab('player-kills-tab', this)">🎯 PLAYER KILLS</button>
        <button id="tab-btn-player-stats" class="tab-btn" onclick="switchTab('player-stats-tab', this)">📊 PLAYER STATS</button>
        <button id="tab-btn-team-standings" class="tab-btn" onclick="switchTab('team-standings-tab', this)">🏆 TEAM STANDINGS</button>
    </div>

    <!-- 1. TEAM POINTS TAB -->
    <div id="team-points-tab" class="table-responsive active">
        <table>
            <thead id="team-points-head"><tr><th class="status-message">LOADING MAPS...</th></tr></thead>
            <tbody id="team-points-body"><tr><td class="status-message">CONNECTING...</td></tr></tbody>
        </table>
    </div>

    <!-- 2. PLAYER KILLS TAB -->
    <div id="player-kills-tab" class="table-responsive">
        <table>
            <thead id="player-kills-head"></thead>
            <tbody id="player-kills-body"><tr><td class="status-message">LOADING DATA...</td></tr></tbody>
        </table>
    </div>

    <!-- 3. PLAYER STATS TAB -->
    <div id="player-stats-tab" class="table-responsive">
        <table class="compact-sheet-view">
            <thead id="player-stats-head"></thead>
            <tbody id="player-stats-body"><tr><td class="status-message">LOADING STATS...</td></tr></tbody>
        </table>
    </div>

    <!-- 4. TEAM STANDINGS TAB -->
    <div id="team-standings-tab" class="table-responsive">
        <table class="compact-sheet-view">
            <thead id="team-standings-head"></thead>
            <tbody id="team-standings-body"><tr><td class="status-message">LOADING STANDINGS...</td></tr></tbody>
        </table>
    </div>

    <!-- 5. RECENT RESULTS CARDS WRAPPER -->
    <div id="recent-results-tab" class="table-responsive">
        <div class="results-grid" id="resultsCardsContainer">
            <div class="status-message">Syncing History Cards...</div>
        </div>
    </div>
</div>

<canvas id="crackersCanvas"></canvas>
<div id="championPopup" class="champion-popup-overlay">
    <div class="champion-card">
        <div class="champion-title" id="popHeaderType">CURRENT #1 LEADER</div>
        <div class="champion-name" id="popLeaderName">LOADING...</div>
    </div>
</div>

<script>
    const REALTIME_API_URL = "https://script.google.com/macros/s/AKfycbymDx3IvTP6sdu5WFWoJ3fkK5IKFveECMZMenI739Uvg6j5oZnGIrkPmLpfJvUyc-YA2A/exec";

    if (!window.rankMemory) {
        window.rankMemory = { teamPoints: {}, playerKills: {}, playerStats: {}, teamStandings: {} };
    }

    function applyOperationMode(mode) {
        const body = document.body;
        const btnTourney = document.getElementById('btnTourneyMode');
        const btnDashboard = document.getElementById('btnDashboardMode');
        const btnResults = document.getElementById('btnResultsMode');
        
        const tabPointsBtn = document.getElementById('tab-btn-team-points');
        const tabKillsBtn = document.getElementById('tab-btn-player-kills');
        const tabStatsBtn = document.getElementById('tab-btn-player-stats');
        const tabStandingsBtn = document.getElementById('tab-btn-team-standings');
        const tabsContainer = document.getElementById('mainTabsContainer');

        btnTourney.className = 'mode-toggle-btn';
        btnDashboard.className = 'mode-toggle-btn';
        btnResults.className = 'mode-toggle-btn';
        tabsContainer.style.display = 'flex';

        if (mode === 'dashboard') {
            btnDashboard.className = 'mode-toggle-btn active-dashboard';
            tabPointsBtn.classList.add('hide-tab-logic');
            tabKillsBtn.classList.add('hide-tab-logic');
            tabStatsBtn.classList.remove('hide-tab-logic');
            tabStandingsBtn.classList.remove('hide-tab-logic');
            switchTab('player-stats-tab', tabStatsBtn);
        } else if (mode === 'results') {
            btnResults.className = 'mode-toggle-btn active-results';
            tabsContainer.style.display = 'none';
            document.querySelectorAll('.table-responsive').forEach(tab => tab.classList.remove('active'));
            document.getElementById('recent-results-tab').classList.add('active');
        } else {
            btnTourney.className = 'mode-toggle-btn active-tournament';
            tabPointsBtn.classList.remove('hide-tab-logic');
            tabKillsBtn.classList.remove('hide-tab-logic');
            tabStatsBtn.classList.add('hide-tab-logic');
            tabStandingsBtn.classList.add('hide-tab-logic');
            switchTab('team-points-tab', tabPointsBtn);
        }
    }

    function calculateRankArrow(storageKey, identifier, currentRank) {
        if (!identifier) return '';
        let arrowHTML = '';
        let oldRank = window.rankMemory[storageKey][identifier];
        if (oldRank !== undefined) {
            if (currentRank < oldRank) arrowHTML = `<span class="pos-change pos-up">↑${oldRank - currentRank}</span>`;
            else if (currentRank > oldRank) arrowHTML = `<span class="pos-change pos-down">↓${currentRank - oldRank}</span>`;
        }
        window.rankMemory[storageKey][identifier] = currentRank;
        return arrowHTML;
    }

    function switchTab(tabId, button) {
        document.querySelectorAll('.table-responsive').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        button.classList.add('active');
        triggerTabCelebration(tabId);
    }

    async function fetchAllSheetsData() {
        try {
            const response = await fetch(`${REALTIME_API_URL}?_=${new Date().getTime()}`);
            const allData = await response.json();
            
            buildDynamicTeamPointsGrid(allData.teamPoints);
            buildPlayerKillsGrid(allData.playerKills);
            buildPlayerStatsGrid(allData.playerStats);
            buildTeamStandingsGrid(allData.teamStandings);
            buildRecentResultsCards(allData.recentResults);
        } catch (error) { console.error("Sync error:", error); }
    }

    function buildRecentResultsCards(rows) {
        const container = document.getElementById('resultsCardsContainer');
        if (!rows || rows.length <= 1) {
            container.innerHTML = `<div class="status-message">No history found.</div>`;
            return;
        }
        container.innerHTML = '';
        for(let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if(!row || !row[0] || row[0].toString().trim() === "") continue;
            
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="card-date">📅 ${row[0] || 'N/A'}</div>
                <div class="card-title">${row[1] || 'Tournament'}</div>
                <div class="card-row"><span class="row-label">🏆 Champion Squad</span><span class="row-value">🥇 ${row[2] || 'TBD'}</span></div>
                <div class="card-row"><span class="row-label">📊 Score Summary</span><span class="row-value">${row[3] || '0'}</span></div>
                <div class="card-row"><span class="row-label">🔥 Tournament MVP</span><span class="row-value">${row[4] || 'TBD'}</span></div>
                <div class="card-row"><span class="row-label">💀 Total Frag Count</span><span class="row-value" style="color:#ffaa44;">${row[5] || '0'} Kills</span></div>
            `;
            container.appendChild(card);
        }
    }

    function buildDynamicTeamPointsGrid(data) {
        if (!data || !data.mapList || !data.teams) return;
        const thead = document.getElementById('team-points-head');
        const tbody = document.getElementById('team-points-body');
        
        let headRow1 = '<tr><th rowspan="2" class="rank-header">S:NO</th><th rowspan="2" class="team-name-head">TEAM NAME</th>';
        let headRow2 = '</tr><tr>';
        
        data.mapList.forEach(mapName => {
            headRow1 += `<th colspan="2" class="map-header">${mapName.toUpperCase()}</th>`;
            headRow2 += `<th>P</th><th>K</th>`;
        });
        
        headRow1 += `<th rowspan="2" class="total-points-head">TOTAL POINTS</th></tr>`;
        thead.innerHTML = headRow1 + headRow2;

        // Auto Calculation Logic & Sorting
        data.teams.forEach(team => {
            let total = 0;
            if(team.scores) {
                team.scores.forEach(s => {
                    let cleanedVal = s !== undefined ? s.toString().trim() : '0';
                    if(cleanedVal === '-' || cleanedVal === '') cleanedVal = '0';
                    let num = parseFloat(cleanedVal);
                    if(!isNaN(num)) total += num;
                });
            }
            team.calculatedTotalPoints = total;
        });

        data.teams.sort((a, b) => b.calculatedTotalPoints - a.calculatedTotalPoints);

        tbody.innerHTML = '';
        let currentRank = 1;

        data.teams.forEach(team => {
            if (!team.teamName || team.teamName.toString().trim() === "" || team.teamName.toUpperCase() === "TEAM NAME") return;

            const tr = document.createElement('tr');
            tr.className = 'table-row';
            let arrow = calculateRankArrow('teamPoints', team.teamName, currentRank);
            
            let rowHTML = `<td class="rank-cell">${currentRank}${arrow}</td>`;
            rowHTML += `<td class="team-name-cell">${team.teamName}</td>`;
            
            team.scores.forEach(score => { 
                let displayScore = (score !== undefined && score.toString().trim() !== '') ? score : '-';
                rowHTML += `<td>${displayScore}</td>`; 
            });
            
            // Total Points exact cell grid border attachment
            rowHTML += `<td class="total-points-cell">${team.calculatedTotalPoints}</td>`;
            
            tr.innerHTML = rowHTML; 
            tbody.appendChild(tr); 
            currentRank++;
        });
    }

    function buildPlayerKillsGrid(rows) {
        if (!rows || rows.length === 0) return;
        const thead = document.getElementById('player-kills-head');
        const tbody = document.getElementById('player-kills-body');
        let startRowIdx = rows[0][0] && rows[0][0].toString().toUpperCase().includes("TYT PORKALAM") ? 1 : 0;
        const headerRow = rows[startRowIdx];
        const numCols = headerRow.length;

        let headHTML = `<tr><th class="rank-header">S:NO</th><th class="player-name-head">${headerRow[0] || 'PLAYER NAME'}</th>`;
        for(let c = 1; c < numCols - 1; c++) headHTML += `<th>${headerRow[c] || 'MATCH'}</th>`;
        headHTML += `<th class="total-points-head">${headerRow[numCols - 1] || 'TOTAL KILLS'}</th></tr>`;
        thead.innerHTML = headHTML;

        tbody.innerHTML = ''; let currentRank = 1;
        for (let i = startRowIdx + 1; i < rows.length; i++) {
            const row = rows[i]; if (!row || !row[0] || row[0].toString().trim() === "" || row[0].toString().toUpperCase().includes("PLAYER NAME")) continue;
            const tr = document.createElement('tr'); tr.className = 'table-row';
            let arrow = calculateRankArrow('playerKills', row[0].toString().trim(), currentRank);
            let cellHTML = `<td class="rank-cell">${currentRank}${arrow}</td>`;
            cellHTML += `<td class="player-name-cell">${row[0]}</td>`;
            for(let d = 1; d < numCols - 1; d++) cellHTML += `<td>${row[d] !== undefined ? row[d] : '-'}</td>`;
            cellHTML += `<td class="total-points-cell">${row[numCols - 1] !== undefined ? row[numCols - 1] : '-'}</td>`;
            tr.innerHTML = cellHTML; tbody.appendChild(tr); currentRank++;
        }
    }

    function buildPlayerStatsGrid(rows) {
        if (!rows || rows.length === 0) return;
        const thead = document.getElementById('player-stats-head');
        const tbody = document.getElementById('player-stats-body');
        let startRowIdx = rows[0][0] && rows[0][0].toString().toUpperCase().includes("TYT PORKALAM") ? 1 : 0;
        const headerRow = rows[startRowIdx];
        const startIdx = headerRow[0] && headerRow[0].toString().toUpperCase().includes("S:") ? 1 : 0;
        const numCols = headerRow.length;

        let headHTML = `<tr><th class="rank-header">S:NO</th><th class="player-name-head">${headerRow[startIdx] || 'PLAYER NAME'}</th>`;
        for (let c = startIdx + 1; c < numCols; c++) headHTML += `<th>${headerRow[c] || 'STAT'}</th>`;
        thead.innerHTML = headHTML + `</tr>`;
        
        tbody.innerHTML = ''; let currentRank = 1;
        for (let i = startRowIdx + 1; i < rows.length; i++) {
            const row = rows[i]; if (!row || !row[startIdx] || row[startIdx].toString().trim() === "" || row[startIdx].toString().toUpperCase().includes("PLAYER NAME")) continue;
            const tr = document.createElement('tr'); tr.className = 'table-row';
            let arrow = calculateRankArrow('playerStats', row[startIdx].toString().trim(), currentRank);
            let cellHTML = `<td class="rank-cell">${currentRank}${arrow}</td>`;
            cellHTML += `<td class="player-name-cell">${row[startIdx]}</td>`;
            for (let d = startIdx + 1; d < numCols; d++) {
                let val = row[d]; if (d === numCols - 1 && val !== undefined && !isNaN(val) && val !== "") val = Number(val).toFixed(2);
                if (d === numCols - 1) cellHTML += `<td class="total-points-cell">${val !== undefined ? val : '-'}</td>`;
                else cellHTML += `<td>${val !== undefined ? val : '-'}</td>`;
            }
            tr.innerHTML = cellHTML; tbody.appendChild(tr); currentRank++;
        }
    }

    function buildTeamStandingsGrid(rows) {
        if (!rows || rows.length === 0) return;
        const thead = document.getElementById('team-standings-head');
        const tbody = document.getElementById('team-standings-body');
        let startRowIdx = rows[0][0] && rows[0][0].toString().toUpperCase().includes("TYT PORKALAM") ? 1 : 0;
        const headerRow = rows[startRowIdx];
        const startIdx = headerRow[0] && headerRow[0].toString().toUpperCase().includes("RANK") ? 1 : 0;
        const numCols = headerRow.length;

        let headHTML = `<tr><th class="rank-header">S:NO</th><th class="team-name-head">${headerRow[startIdx] || 'TEAM NAME'}</th>`;
        for (let c = startIdx + 1; c < numCols; c++) headHTML += `<th>${headerRow[c] || 'DATA'}</th>`;
        thead.innerHTML = headHTML + `</tr>`;

        tbody.innerHTML = ''; let currentRank = 1;
        for (let i = startRowIdx + 1; i < rows.length; i++) {
            const row = rows[i]; if (!row || !row[startIdx] || row[startIdx].toString().trim() === "" || row[startIdx].toString().trim() === "0") continue;
            const tr = document.createElement('tr'); tr.className = 'table-row';
            let arrow = calculateRankArrow('teamStandings', row[startIdx].toString().trim(), currentRank);
            let cellHTML = `<td class="rank-cell">${currentRank}${arrow}</td>`;
            cellHTML += `<td class="team-name-cell">${row[startIdx]}</td>`;
            for (let d = startIdx + 1; d < numCols; d++) {
                let val = row[d]; if (d === numCols - 1 && val !== undefined && !isNaN(val) && val !== '') val = Number(val).toFixed(2);
                if (d === numCols - 1) cellHTML += `<td class="total-points-cell">${val !== undefined ? val : 0}</td>`;
                else cellHTML += `<td>${val !== undefined ? val : 0}</td>`;
            }
            tr.innerHTML = cellHTML; tbody.appendChild(tr); currentRank++;
        }
    }

    let lastWinnerCache = {};
    function triggerTabCelebration(tabId) {
        setTimeout(() => {
            const container = document.getElementById(tabId); if (!container) return;
            const firstRow = container.querySelector('tbody tr'); if (!firstRow) return;
            const cells = firstRow.querySelectorAll('td'); if (cells.length < 2) return;
            
            let winnerName = cells[1].innerText || cells[1].textContent;
            winnerName = winnerName.trim();
            if (winnerName.toUpperCase() === "LOADING..." || winnerName === "") return;

            if (lastWinnerCache[tabId] !== winnerName) {
                lastWinnerCache[tabId] = winnerName;
                let cleanName = tabId.includes('kill') ? "PLAYER KILLS" : (tabId.includes('stat') ? "PLAYER STATS" : (tabId.includes('standing') ? "TEAM STANDINGS" : "TEAM POINTS"));
                document.getElementById('popHeaderType').innerText = cleanName + " #1 LEADER";
                document.getElementById('popLeaderName').innerText = winnerName;
                const popup = document.getElementById('championPopup');
                popup.classList.add('show'); triggerNativeCrackers();
                setTimeout(() => popup.classList.remove('show'), 3000);
            }
        }, 400);
    }
</script>

<script>
const canvas = document.getElementById('odysseyCanvas'); const ctx = canvas.getContext('2d');
function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', initCanvas); initCanvas();

function initFireBackground() {
    let particles = [];
    class Particle {
        constructor() { this.x = Math.random() * canvas.width; this.y = canvas.height + Math.random() * 100; this.size = Math.random() * 3 + 1; this.speedY = Math.random() * 1.2 + 0.4; this.speedX = Math.random() * 0.8 - 0.4; this.opacity = Math.random() * 0.4 + 0.4; }
        update() { this.y -= this.speedY; this.x += this.speedX; if (this.y < -10) { this.y = canvas.height + 10; this.x = Math.random() * canvas.width; } }
        draw() { ctx.fillStyle = `rgba(255, ${Math.floor(Math.random() * 90) + 40}, 0, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    for (let i = 0; i < 40; i++) particles.push(new Particle());
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    animate();
}

const cCanvas = document.getElementById('crackersCanvas'); const cCtx = cCanvas.getContext('2d');
let cParticles = [], crackersAnimationId;
function resizeCrackersCanvas() { cCanvas.width = window.innerWidth; cCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCrackersCanvas); resizeCrackersCanvas();

class CrackerParticle {
    constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.radius = Math.random() * 3 + 2; const angle = Math.random() * Math.PI * 2, velocity = Math.random() * 10 + 4; this.speedX = Math.cos(angle) * velocity; this.speedY = Math.sin(angle) * velocity; this.gravity = 0.18; this.alpha = 1; this.decay = Math.random() * 0.015 + 0.012; }
    update() { this.speedY += this.gravity; this.x += this.speedX; this.y += this.speedY; this.alpha -= this.decay; }
    draw() { cCtx.save(); cCtx.globalAlpha = this.alpha; cCtx.fillStyle = this.color; cCtx.shadowBlur = 8; cCtx.shadowColor = this.color; cCtx.beginPath(); cCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); cCtx.fill(); cCtx.restore(); }
}
function createExplosion(x, y) { const colors = ['#ff4500', '#ff8c00', '#ffd700', '#ff0000', '#ffffff']; for (let i = 0; i < 80; i++) cParticles.push(new CrackerParticle(x, y, colors[Math.floor(Math.random() * colors.length)])); }
function animateCrackers() { cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height); for (let i = cParticles.length - 1; i >= 0; i--) { cParticles[i].update(); if (cParticles[i].alpha <= 0) cParticles.splice(i, 1); else cParticles[i].draw(); } crackersAnimationId = requestAnimationFrame(animateCrackers); }
function triggerNativeCrackers() { cParticles = []; cancelAnimationFrame(crackersAnimationId); animateCrackers(); createExplosion(window.innerWidth * 0.2, window.innerHeight * 0.4); setTimeout(() => createExplosion(window.innerWidth * 0.8, window.innerHeight * 0.4), 250); setTimeout(() => createExplosion(window.innerWidth * 0.5, window.innerHeight * 0.3), 500); }

window.addEventListener('load', () => { initFireBackground(); applyOperationMode('tournament'); });
function openMainPointsTable() { document.getElementById('porkalamSplash').classList.add('fade-hide'); fetchAllSheetsData(); setInterval(fetchAllSheetsData, 2000); }
</script>
